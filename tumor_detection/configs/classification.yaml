data:
  dataset_root: data/raw/kaggle_classification/brain-tumor-mri-dataset
  output_dir: models/classification
  num_workers: 4

model:
  name: densenet121
  spatial_dims: 2
  in_channels: 3
  num_classes: 4

training:
  epochs: 40
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.00001
  image_size: 224
  amp: true
  seed: 42

classes:
  - glioma
  - meningioma
  - notumor
  - pituitary
