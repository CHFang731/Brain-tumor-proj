data:
  dataset_root: ../kagglehub_cache/datasets/nikhilroxtomar/brain-tumor-segmentation/versions/1
  split_json: data/processed/split_2d.json
  output_dir: models/smp_unet_resnet34
  image_size: 256
  num_workers: 4

split:
  train_fraction: 0.7
  val_fraction: 0.15

model:
  architecture: smp_unet
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 1
  out_channels: 1

training:
  seed: 42
  epochs: 60
  batch_size: 12
  learning_rate: 0.0002
  weight_decay: 0.00001
  amp: true
  bce_weight: 0.4
  pos_weight: 2.0
  early_stopping_patience: 20
