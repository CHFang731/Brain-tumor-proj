data:
  dataset_root: ../kagglehub_cache/datasets/nikhilroxtomar/brain-tumor-segmentation/versions/1
  split_json: data/processed/split_2d.json
  output_dir: models/smp_deeplabv3plus_effb4_320_from256_ft
  image_size: 320
  num_workers: 4

split:
  train_fraction: 0.7
  val_fraction: 0.15

model:
  architecture: smp_deeplabv3plus
  encoder_name: timm-efficientnet-b4
  encoder_weights: imagenet
  in_channels: 3
  out_channels: 1

training:
  seed: 42
  epochs: 70
  batch_size: 6
  learning_rate: 0.000012
  weight_decay: 0.00001
  amp: true
  bce_weight: 0.28
  focal_weight: 0.32
  focal_gamma: 2.0
  pos_weight: 2.4
  stronger_aug: true
  aggressive_aug: false
  early_stopping_patience: 20
  scheduler: cosine
  scheduler_tmax: 70
  scheduler_eta_min: 0.0000003
