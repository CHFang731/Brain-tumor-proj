data:
  dataset_root: ../kagglehub_cache/datasets/nikhilroxtomar/brain-tumor-segmentation/versions/1
  split_json: data/processed/split_2d.json
  output_dir: models/unet2d
  image_size: 256
  num_workers: 4

split:
  train_fraction: 0.7
  val_fraction: 0.15

model:
  in_channels: 1
  out_channels: 1
  base_channels: 32

training:
  seed: 42
  epochs: 35
  batch_size: 16
  learning_rate: 0.0005
  weight_decay: 0.00001
  amp: true
  bce_weight: 0.5
  pos_weight: 3.0
  early_stopping_patience: 8
