data:
  dataset_root: ../kagglehub_cache/datasets/nikhilroxtomar/brain-tumor-segmentation/versions/1
  split_json: data/processed/split_2d.json
  output_dir: models/smp_deeplabv3plus_resnet50_320_seed44_lowlr
  image_size: 320
  num_workers: 4

split:
  train_fraction: 0.7
  val_fraction: 0.15

model:
  architecture: smp_deeplabv3plus
  encoder_name: resnet50
  encoder_weights: imagenet
  in_channels: 3
  out_channels: 1

training:
  seed: 44
  epochs: 50
  batch_size: 8
  learning_rate: 0.00003
  weight_decay: 0.00001
  amp: true
  bce_weight: 0.3
  focal_weight: 0.3
  focal_gamma: 2.0
  pos_weight: 2.4
  stronger_aug: true
  early_stopping_patience: 15
  scheduler: cosine
  scheduler_tmax: 50
  scheduler_eta_min: 0.0000005
