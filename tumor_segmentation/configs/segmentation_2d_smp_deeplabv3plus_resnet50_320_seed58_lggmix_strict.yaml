data:
  dataset_root: ../kagglehub_cache/datasets/nikhilroxtomar/brain-tumor-segmentation/versions/1
  split_json: data/processed/split_2d_plus_lgg400_strict.json
  output_dir: models/smp_deeplabv3plus_resnet50_320_seed58_lggmix_strict
  image_size: 320
  num_workers: 4

split:
  train_fraction: 0.7
  val_fraction: 0.15

model:
  architecture: smp_deeplabv3plus
  encoder_name: resnet50
  encoder_weights: imagenet
  in_channels: 3
  out_channels: 1

training:
  seed: 58
  epochs: 120
  batch_size: 8
  learning_rate: 0.00005
  weight_decay: 0.00001
  amp: true
  bce_weight: 0.28
  focal_weight: 0.32
  focal_gamma: 2.0
  pos_weight: 2.5
  stronger_aug: true
  aggressive_aug: false
  conservative_aug: false
  train_repeat: 1
  early_stopping_patience: 28
  scheduler: cosine
  scheduler_tmax: 120
  scheduler_eta_min: 0.0000005
