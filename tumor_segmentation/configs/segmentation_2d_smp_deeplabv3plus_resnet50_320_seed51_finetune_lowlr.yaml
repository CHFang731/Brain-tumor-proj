data:
  dataset_root: ../kagglehub_cache/datasets/nikhilroxtomar/brain-tumor-segmentation/versions/1
  split_json: data/processed/split_2d.json
  output_dir: models/smp_deeplabv3plus_resnet50_320_seed51_finetune_lowlr
  image_size: 320
  num_workers: 4

split:
  train_fraction: 0.7
  val_fraction: 0.15

model:
  architecture: smp_deeplabv3plus
  encoder_name: resnet50
  encoder_weights: imagenet
  in_channels: 3
  out_channels: 1

training:
  seed: 51
  epochs: 80
  batch_size: 8
  learning_rate: 0.00001
  weight_decay: 0.00001
  amp: true
  bce_weight: 0.5
  focal_weight: 0.0
  focal_gamma: 2.0
  pos_weight: 1.5
  stronger_aug: false
  aggressive_aug: false
  early_stopping_patience: 24
  scheduler: cosine
  scheduler_tmax: 80
  scheduler_eta_min: 0.0000001
