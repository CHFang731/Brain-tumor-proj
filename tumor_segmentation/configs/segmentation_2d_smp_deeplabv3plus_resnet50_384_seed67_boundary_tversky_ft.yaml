data:
  dataset_root: ../kagglehub_cache/datasets/nikhilroxtomar/brain-tumor-segmentation/versions/1
  split_json: data/processed/split_2d.json
  output_dir: models/smp_deeplabv3plus_resnet50_384_seed67_boundary_tversky_ft
  image_size: 384
  num_workers: 4

split:
  train_fraction: 0.7
  val_fraction: 0.15

model:
  architecture: smp_deeplabv3plus
  encoder_name: resnet50
  encoder_weights: imagenet
  in_channels: 3
  out_channels: 1

training:
  seed: 67
  epochs: 36
  batch_size: 5
  learning_rate: 0.000003
  weight_decay: 0.00001
  amp: true
  bce_weight: 0.28
  focal_weight: 0.20
  focal_gamma: 2.0
  tversky_weight: 0.12
  tversky_alpha: 0.30
  tversky_beta: 0.70
  boundary_weight: 0.06
  pos_weight: 2.4
  stronger_aug: false
  aggressive_aug: false
  conservative_aug: true
  train_repeat: 2
  aug_qc_min_area_ratio: 0.45
  aug_qc_max_area_ratio: 1.85
  aug_qc_max_border_zero_increase: 0.28
  early_stopping_patience: 10
  scheduler: cosine
  scheduler_tmax: 36
  scheduler_eta_min: 0.0000001
